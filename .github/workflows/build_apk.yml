name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        run: git clone --depth 1 https://github.com/alejandrofongz03/booklingua.git .

      - name: Setup Java
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk-headless

      - name: Download Flutter
        run: |
          wget -qO flutter.tar.xz https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.24.0-stable.tar.xz
          tar -xf flutter.tar.xz
          rm flutter.tar.xz
          echo "$PWD/flutter/bin" >> $GITHUB_PATH

      - name: Install deps
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="build-$(date +%Y%m%d-%H%M%S)"
          gh release create "$TAG" \
            --title "APK build $(date +%Y-%m-%d)" \
            --notes "Build automático del commit ${{ github.sha }}" \
            build/app/outputs/flutter-apk/*.apk
